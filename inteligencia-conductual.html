<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recomendaciones Finales - Flujo Vertical</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  
  body{
    font-family: 'Montserrat', sans-serif;
    color:white;
    background:#050b18;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* 🌌 FONDO */
  .galaxy{ position:fixed; width:100%; height:100%; top:0; left:0; z-index:-1; }
  .nebula{
    position:absolute; width:100%; height:100%;
    background: radial-gradient(circle at 20% 30%, rgba(138,43,226,0.15), transparent 40%);
    filter:blur(90px);
  }

  .btn-back {
    position: absolute; top: 20px; left: 20px;
    color: #d4af37; text-decoration: none; font-size: 13px;
    border: 1px solid #d4af37; padding: 10px 25px; border-radius: 50px;
    z-index: 100;
    transition: 0.3s;
  }
  .btn-back:hover { background:#d4af37; color:#050b18; transform: scale(1.05); }

  header { text-align: center; padding: 60px 20px 20px; }
  h1 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 32px; }

  /* 🐍 CONTENEDOR VERTICAL */
  .snake-game-container {
    position: relative;
    width: 100%;
    max-width: 600px; 
    height: 800px; 
    margin: 20px auto;
  }

  .snake-svg { width: 100%; height: 100%; }

  .snake-path { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 12; stroke-linecap: round; }
  .snake-progress {
    fill: none; stroke: #00ff66; stroke-width: 12; stroke-linecap: round;
    stroke-dasharray: 3000; stroke-dashoffset: 3000;
    transition: stroke-dashoffset 0.8s ease;
    filter: drop-shadow(0 0 10px rgba(0, 255, 102, 0.5));
  }

  /* 🟢 CÍRCULOS */
  .step-circle {
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid #00ff66; background: #050b18;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white; position: absolute;
    cursor: pointer; transition: 0.3s; z-index: 5;
  }
  .step-circle.active {
    background: #00ff66; color: #050b18;
    box-shadow: 0 0 20px rgba(0, 255, 102, 0.7);
    transform: scale(1.1);
  }

  /* 📦 CUADRO FLOTANTE PEQUEÑO */
  .response-box-game {
    position: fixed;
    width: 320px;
    max-width: 90%;
    padding: 20px;
    background: rgba(10, 20, 40, 0.95);
    backdrop-filter: blur(10px);
    border: 2px solid #d4af37;
    border-radius: 15px;
    color: #fff;
    display: none;
    z-index: 1000;
    text-align: left;
    opacity: 0;
    transition: opacity 0.3s;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .response-box-game.show { display: block; opacity: 1; }
  .response-box-game h3 { color: #d4af37; font-size: 18px; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
  .response-box-game p { font-size: 14px; line-height: 1.4; color: #cbd5e0; margin-bottom: 8px; }
  .correct { border-left: 3px solid #00ff66; padding-left: 8px; margin-bottom: 5px; color: #00ff66; }
  .incorrect { border-left: 3px solid #ff4d4d; padding-left: 8px; color: #ff4d4d; }

  /* BOTÓN CERRAR */
  .close-btn {
    margin-top: 12px;
    padding: 8px 15px;
    background: #d4af37;
    color: #050b18;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    float: right;
    transition: 0.3s;
  }
  .close-btn:hover { background:#00ff66; color:#050b18; }

  footer { padding: 30px; opacity: 0.4; font-size: 12px; text-align: center; }
</style>
</head>
<body>

<div class="galaxy"><div class="nebula"></div></div>
<a href="tucan.html" class="btn-back">← Volver</a>

<header>
  <h1>RECOMENDACIONES FINALES</h1>
</header>

<div class="snake-game-container">
  <svg class="snake-svg" viewBox="0 0 400 800">
    <path id="snake-bg" class="snake-path" d="M 100 50 C 350 50, 350 150, 200 150 C 50 150, 50 250, 200 250 C 350 250, 350 350, 200 350 C 50 350, 50 450, 200 450 C 350 450, 350 550, 100 550" />
    <path id="snake-progress" class="snake-progress" d="M 100 50 C 350 50, 350 150, 200 150 C 50 150, 50 250, 200 250 C 350 250, 350 350, 200 350 C 50 350, 50 450, 200 450 C 350 450, 350 550, 100 550" />
  </svg>

  <!-- CÍRCULOS DE LAS 5 RECOMENDACIONES -->
  <div class="step-circle" style="top: 25px; left: 75px;" onclick="toggleStep(0, this)">1</div>
  <div class="step-circle" style="top: 150px; left: 175px;" onclick="toggleStep(1, this)">2</div>
  <div class="step-circle" style="top: 275px; left: 75px;" onclick="toggleStep(2, this)">3</div>
  <div class="step-circle" style="top: 400px; left: 175px;" onclick="toggleStep(3, this)">4</div>
  <div class="step-circle" style="top: 525px; left: 75px;" onclick="toggleStep(4, this)">5</div>

  <div id="game-info-modal" class="response-box-game">
    <h3 id="modal-title"></h3>
    <div id="modal-content"></div>
    <button class="close-btn" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<footer>© 2026 - Universidad Simón Bolívar</footer>

<script>
const questions = [
  { t: "1️⃣ PREPARAR EJEMPLOS CONCRETOS", c: `<p>🎯 Propósito: Demostrar habilidades mediante ejemplos reales.</p>
  <div class='correct'>✅ Correcta: “Selecciona situaciones reales de tu experiencia que muestren tus logros y habilidades. Tener ejemplos listos ayuda a responder de forma clara y convincente.”</div>
  <div class='incorrect'>❌ Incorrecta: “Improvisar ejemplos sin evidencia concreta.”</div>
  <p>🔎 Error: La falta de ejemplos reduce la credibilidad y claridad de la respuesta.</p>` },

  { t: "2️⃣ PRACTICAR PREVIAMENTE LAS RESPUESTAS", c: `<p>🎯 Propósito: Ganar seguridad y fluidez al responder.</p>
  <div class='correct'>✅ Correcta: “Ensaya tus respuestas a preguntas comunes o simulaciones de entrevista para mejorar la comunicación y confianza.”</div>
  <div class='incorrect'>❌ Incorrecta: “No practicar y confiar en improvisar todo durante la entrevista.”</div>
  <p>🔎 Error: Respuestas inseguras o confusas afectan la impresión profesional.</p>` },

  { t: "3️⃣ ADAPTAR EL DISCURSO AL PERFIL DEL CARGO", c: `<p>🎯 Propósito: Resaltar habilidades relevantes para el puesto.</p>
  <div class='correct'>✅ Correcta: “Analiza el puesto y la empresa, y ajusta tus respuestas destacando habilidades pertinentes al cargo.”</div>
  <div class='incorrect'>❌ Incorrecta: “Dar respuestas genéricas sin relación con el cargo ni la empresa.”</div>
  <p>🔎 Error: Falta de adaptación muestra poca preparación y comprensión del puesto.</p>` },

  { t: "4️⃣ COHERENCIA ENTRE LENGUAJE VERBAL Y NO VERBAL", c: `<p>🎯 Propósito: Generar confianza y credibilidad durante la entrevista.</p>
  <div class='correct'>✅ Correcta: “Mantén postura erguida, contacto visual y gestos acordes con lo que dices.”</div>
  <div class='incorrect'>❌ Incorrecta: “Decir algo positivo pero con postura encorvada o gestos contradictorios.”</div>
  <p>🔎 Error: Contradicción entre palabras y acciones genera desconfianza.</p>` },

  { t: "5️⃣ MANTENER ACTITUD PROFESIONAL Y RESPETUOSA", c: `<p>🎯 Propósito: Transmitir madurez y profesionalismo.</p>
  <div class='correct'>✅ Correcta: “Demuestra respeto hacia el entrevistador y la empresa, evita críticas y mantén un comportamiento cordial.”</div>
  <div class='incorrect'>❌ Incorrecta: “Criticar experiencias pasadas, usar lenguaje informal o actitud negativa.”</div>
  <p>🔎 Error: Actitud poco profesional perjudica la imagen y percepción de idoneidad.</p>` }
];

let activeStep = null;

function toggleStep(i, el) {
  const modal = document.getElementById('game-info-modal');

  if(activeStep === i){
    closeModal();
    return;
  }

  document.getElementById('modal-title').innerText = questions[i].t;
  document.getElementById('modal-content').innerHTML = questions[i].c;
  modal.classList.add('show');

  document.querySelectorAll('.step-circle').forEach((c, idx) => {
    idx <= i ? c.classList.add('active') : c.classList.remove('active');
  });

  const progress = document.getElementById('snake-progress');
  progress.style.strokeDashoffset = 3000 * (1 - (i + 1) / 5);

  activeStep = i;
}

function closeModal(){
  const modal = document.getElementById('game-info-modal');
  modal.classList.remove('show');
  activeStep = null;
}
</script>
</body>
</html>
