<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preguntas Frecuentes - Flujo Vertical</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  
  body{
    font-family: 'Montserrat', sans-serif;
    color:white;
    background:#050b18;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* 🌌 FONDO */
  .galaxy{ position:fixed; width:100%; height:100%; top:0; left:0; z-index:-1; }
  .nebula{
    position:absolute; width:100%; height:100%;
    background: radial-gradient(circle at 20% 30%, rgba(138,43,226,0.15), transparent 40%);
    filter:blur(90px);
  }

  .btn-back {
    position: absolute; top: 20px; left: 20px;
    color: #d4af37; text-decoration: none; font-size: 13px;
    border: 1px solid #d4af37; padding: 10px 25px; border-radius: 50px;
    z-index: 100;
    transition: 0.3s;
  }
  .btn-back:hover { background:#d4af37; color:#050b18; transform: scale(1.05); }

  header { text-align: center; padding: 60px 20px 20px; }
  h1 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 32px; }

  /* 🐍 CONTENEDOR VERTICAL */
  .snake-game-container {
    position: relative;
    width: 100%;
    max-width: 600px; 
    height: 1000px; 
    margin: 20px auto;
  }

  .snake-svg { width: 100%; height: 100%; }

  .snake-path { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 12; stroke-linecap: round; }
  .snake-progress {
    fill: none; stroke: #00ff66; stroke-width: 12; stroke-linecap: round;
    stroke-dasharray: 3500; stroke-dashoffset: 3500;
    transition: stroke-dashoffset 0.8s ease;
    filter: drop-shadow(0 0 10px rgba(0, 255, 102, 0.5));
  }

  /* 🟢 CÍRCULOS */
  .step-circle {
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid #00ff66; background: #050b18;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white; position: absolute;
    cursor: pointer; transition: 0.3s; z-index: 5;
  }
  .step-circle.active {
    background: #00ff66; color: #050b18;
    box-shadow: 0 0 20px rgba(0, 255, 102, 0.7);
    transform: scale(1.1);
  }

  /* 📦 CUADRO FLOTANTE PEQUEÑO */
  .response-box-game {
    position: fixed;
    width: 320px;
    max-width: 90%;
    padding: 20px;
    background: rgba(10, 20, 40, 0.95);
    backdrop-filter: blur(10px);
    border: 2px solid #d4af37;
    border-radius: 15px;
    color: #fff;
    display: none;
    z-index: 1000;
    text-align: left;
    opacity: 0;
    transition: opacity 0.3s;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .response-box-game.show { display: block; opacity: 1; }
  .response-box-game h3 { color: #d4af37; font-size: 18px; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
  .response-box-game p { font-size: 14px; line-height: 1.4; color: #cbd5e0; margin-bottom: 8px; }
  .correct { border-left: 3px solid #00ff66; padding-left: 8px; margin-bottom: 5px; color: #00ff66; }
  .incorrect { border-left: 3px solid #ff4d4d; padding-left: 8px; color: #ff4d4d; }

  /* BOTÓN CERRAR */
  .close-btn {
    margin-top: 12px;
    padding: 8px 15px;
    background: #d4af37;
    color: #050b18;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    float: right;
    transition: 0.3s;
  }
  .close-btn:hover { background:#00ff66; color:#050b18; }

  footer { padding: 30px; opacity: 0.4; font-size: 12px; text-align: center; }
</style>
</head>
<body>

<div class="galaxy"><div class="nebula"></div></div>
<a href="tucan.html" class="btn-back">← Volver</a>

<header>
  <h1>LENGUAJE CORPORAL Y ACTITUD</h1>
</header>

<div class="snake-game-container">
  <svg class="snake-svg" viewBox="0 0 400 1000">
    <path id="snake-bg" class="snake-path" d="M 100 50 C 350 50, 350 200, 200 200 C 50 200, 50 350, 200 350 C 350 350, 350 500, 200 500 C 50 500, 50 650, 200 650 C 350 650, 350 800, 100 800 C 50 800, 50 950, 200 950" />
    <path id="snake-progress" class="snake-progress" d="M 100 50 C 350 50, 350 200, 200 200 C 50 200, 50 350, 200 350 C 350 350, 350 500, 200 500 C 50 500, 50 650, 200 650 C 350 650, 350 800, 100 800 C 50 800, 50 950, 200 950" />
  </svg>

  <!-- CÍRCULOS DE LAS 6 PREGUNTAS -->
  <div class="step-circle" style="top: 25px; left: 75px;" onclick="toggleStep(0, this)">1</div>
  <div class="step-circle" style="top: 175px; left: 175px;" onclick="toggleStep(1, this)">2</div>
  <div class="step-circle" style="top: 325px; left: 75px;" onclick="toggleStep(2, this)">3</div>
  <div class="step-circle" style="top: 475px; left: 175px;" onclick="toggleStep(3, this)">4</div>
  <div class="step-circle" style="top: 625px; left: 75px;" onclick="toggleStep(4, this)">5</div>
  <div class="step-circle" style="top: 775px; left: 175px;" onclick="toggleStep(5, this)">6</div>

  <div id="game-info-modal" class="response-box-game">
    <h3 id="modal-title"></h3>
    <div id="modal-content"></div>
    <button class="close-btn" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<footer>© 2026 - Universidad Simón Bolívar</footer>

<script>
const questions = [
  { t: "1️⃣ POSTURA DURANTE LA ENTREVISTA", c: `<p>🎯 Propósito: Evaluar presencia y seguridad mediante postura corporal.</p>
  <div class='correct'>✅ Correcta: “Mantengo la espalda recta, hombros relajados y me siento con confianza. Esto transmite seguridad y profesionalismo.”</div>
  <div class='incorrect'>❌ Incorrecta: “Me encorvo o me recuesto, no le presto atención a la postura.”</div>
  <p>🔎 Error: Una postura cerrada o descuidada genera sensación de inseguridad.</p>` },

  { t: "2️⃣ CONTACTO VISUAL", c: `<p>🎯 Propósito: Evaluar confianza y comunicación efectiva.</p>
  <div class='correct'>✅ Correcta: “Mantengo contacto visual de manera natural, mostrando interés y atención hacia el entrevistador sin intimidar.”</div>
  <div class='incorrect'>❌ Incorrecta: “No miro al entrevistador, me distraigo o miro el suelo constantemente.”</div>
  <p>🔎 Error: La falta de contacto visual transmite desinterés o inseguridad.</p>` },

  { t: "3️⃣ ESCUCHA ACTIVA", c: `<p>🎯 Propósito: Evaluar capacidad de escucha activa y respeto.</p>
  <div class='correct'>✅ Correcta: “Escucho atentamente, asiento con la cabeza y hago preguntas o comentarios pertinentes.”</div>
  <div class='incorrect'>❌ Incorrecta: “No escucho, interrumpo o no reacciono a lo que dice el entrevistador.”</div>
  <p>🔎 Error: La falta de atención demuestra desinterés y poca profesionalidad.</p>` },

  { t: "4️⃣ TONO DE VOZ", c: `<p>🎯 Propósito: Evaluar claridad, seguridad y control de emociones.</p>
  <div class='correct'>✅ Correcta: “Hablo con tono claro, seguro y pausado, evitando murmullos o exageraciones.”</div>
  <div class='incorrect'>❌ Incorrecta: “Hablo muy bajo, rápido o gritando sin control.”</div>
  <p>🔎 Error: Un tono inadecuado dificulta la comprensión y reduce la impresión profesional.</p>` },

  { t: "5️⃣ TIEMPO DE RESPUESTA", c: `<p>🎯 Propósito: Evitar respuestas excesivamente largas y poco claras.</p>
  <div class='correct'>✅ Correcta: “Respondo de forma concisa, estructurando ideas y ejemplos, sin desviarme del tema.”</div>
  <div class='incorrect'>❌ Incorrecta: “Me extiendo demasiado, divago y pierdo el foco de la pregunta.”</div>
  <p>🔎 Error: Las respuestas largas o confusas generan impresión negativa y falta de organización.</p>` },

  { t: "6️⃣ HABLAR DE EMPLEOS ANTERIORES", c: `<p>🎯 Propósito: Evaluar profesionalismo y actitud positiva.</p>
  <div class='correct'>✅ Correcta: “Hablar de experiencias pasadas de manera objetiva, resaltando aprendizajes y evitando críticas a personas o empresas.”</div>
  <div class='incorrect'>❌ Incorrecta: “Critico jefes o compañeros, o cuento experiencias negativas sin filtro.”</div>
  <p>🔎 Error: Hablar mal de empleos anteriores transmite negatividad e inmadurez profesional.</p>` }
];

let activeStep = null;

function toggleStep(i, el) {
  const modal = document.getElementById('game-info-modal');

  document.getElementById('modal-title').innerText = questions[i].t;
  document.getElementById('modal-content').innerHTML = questions[i].c;
  modal.classList.add('show');

  document.querySelectorAll('.step-circle').forEach((c, idx) => {
    idx <= i ? c.classList.add('active') : c.classList.remove('active');
  });

  const progress = document.getElementById('snake-progress');
  progress.style.strokeDashoffset = 3500 * (1 - (i + 1) / 6);

  activeStep = i;
}

function closeModal(){
  const modal = document.getElementById('game-info-modal');
  modal.classList.remove('show');
  activeStep = null;
}
</script>
</body>
</html>
